name: Branch CI

on:
  push:
    branches:
      - develop
      - main

env:
  PYTHON_VERSION: "3.12"

jobs:
  sonar-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Coverage
        run: |
          pytest -v --cov=app --cov-report=xml --cov-fail-under=92

      - name: SonarCloud Branch Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build-push:
    runs-on: ubuntu-latest
    needs: sonar-branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker Image
        run: |
          docker build -t aep-backend:${{ github.run_number }} .

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Tag Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker tag aep-backend:${{ github.run_number }} $DOCKER_USERNAME/aep-backend:${{ github.run_number }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/aep-backend:${{ github.run_number }}